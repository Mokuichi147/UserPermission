name: Release

on:
  # `v` で始まるタグを push すると起動 (例: `git tag v0.4.0 && git push --tags`)。
  push:
    tags: ['v*']
  # 手動でも回せる (誤公開を避けるため publish ジョブは tags push に限定)。
  workflow_dispatch:

jobs:
  # ----------------------------------------------------------------- #
  # Linux: x86_64 + aarch64 の manylinux wheel
  # ----------------------------------------------------------------- #
  linux:
    name: Linux ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --interpreter '3.9'
          manylinux: auto
          sccache: 'true'
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist/*.whl

  # ----------------------------------------------------------------- #
  # macOS: Intel + Apple Silicon
  # ----------------------------------------------------------------- #
  macos:
    name: macOS ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64
            runner: macos-13      # Intel runner
          - target: aarch64
            runner: macos-14      # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --interpreter '3.9'
          sccache: 'true'
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist/*.whl

  # ----------------------------------------------------------------- #
  # Windows: x86_64
  # ----------------------------------------------------------------- #
  windows:
    name: Windows ${{ matrix.target }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --interpreter '3.9'
          sccache: 'true'
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.target }}
          path: dist/*.whl

  # ----------------------------------------------------------------- #
  # ソース配布 (PyPI 慣例 + 未対応プラットフォーム向けのフォールバック)
  # ----------------------------------------------------------------- #
  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist/*.tar.gz

  # ----------------------------------------------------------------- #
  # 集約 → PyPI 公開 + GitHub Release
  # ----------------------------------------------------------------- #
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [linux, macos, windows, sdist]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      # OIDC trusted publisher (PyPI 側で事前設定が必要)
      id-token: write
      # GitHub Release を作るため
      contents: write
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true
      - name: List artifacts
        run: ls -la dist/
      - name: Publish to PyPI (trusted publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
        # API token を使う場合: 上記 `environment` を外し、Secrets に
        # `PYPI_API_TOKEN` を登録した上で以下を有効化する。
        # with:
        #   password: ${{ secrets.PYPI_API_TOKEN }}
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
